<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOM - Minutes of Meeting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --border: #e0e3eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.3px;
      color: var(--accent);
    }

    header span.subtitle {
      color: var(--muted);
      font-size: .875rem;
    }

    header .spacer { flex: 1; }

    .version-tag {
      font-size: .8rem;
      color: var(--muted);
    }

    .lang-group {
      display: inline-flex;
      gap: 4px;
      margin-right: 8px;
    }

    .lang-btn {
      display: inline-block;
      padding: 5px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background-color: transparent;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      line-height: 1;
    }

    .lang-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lang-btn.active {
      background-color: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-danger:hover { background: #fecaca; }
    .btn-small { padding: 4px 10px; font-size: .75rem; }

    .btn-save {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }
    .btn-save:hover {
      background: #bbf7d0;
    }

    .btn-load {
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    .btn-load:hover {
      background: #bfdbfe;
    }

    .btn-save svg, .btn-load svg {
      flex-shrink: 0;
    }

    .file-version-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      background: #ede9fe;
      color: #6d28d9;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .02em;
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-version-badge svg {
      flex-shrink: 0;
    }

    .layout {
      display: flex;
      flex-direction: column;
    }

    .panel {
      padding: 24px;
    }

    .panel-form { border-bottom: 1px solid var(--border); }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .9rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .field { margin-bottom: 14px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .note-item, .action-item, .decision-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }

    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .item-index {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .bullet-list { }

    .bullet-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: flex-start;
    }

    .bullet-row textarea {
      flex: 1;
      min-height: 40px;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      width: 100%;
      cursor: pointer;
      color: var(--muted);
      font-size: .85rem;
      transition: all .15s;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(37,99,235,.04);
    }

    /* Preview panel */
    .panel-preview { background: #1e1e2e; }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .preview-title {
      color: #cdd6f4;
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    #preview-output {
      background: #181825;
      border-radius: var(--radius);
      padding: 20px;
      color: #cdd6f4;
      font-family: 'Courier New', Consolas, monospace;
      font-size: .82rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 200px;
      border: 1px solid #313244;
    }

    .ref-preview {
      font-size: .75rem;
      color: #a6adc8;
      margin-bottom: 10px;
      font-family: monospace;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: .875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* Hidden file input */
    #xml-file-input { display: none; }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    /* Drag and drop */
    .drag-handle {
      cursor: grab;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 2px;
      opacity: .45;
      transition: opacity .15s;
      flex-shrink: 0;
      touch-action: none;
    }

    .drag-handle:hover {
      opacity: 1;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .draggable-item {
      transition: background .15s;
    }

    .draggable-item.dragging {
      opacity: .4;
    }

    .draggable-item.drag-over {
      border-top: 2px solid var(--accent);
    }

    .drag-topic {
      padding: 10px 0;
    }

    .drag-topic.dragging {
      opacity: .4;
    }

    .drag-topic.drag-over {
      border-top: 2px solid var(--accent);
    }

    .note-topic-header {
      cursor: default;
    }

    .note-topic-header .drag-handle {
      cursor: grab;
    }

    .note-topic-block {
      position: relative;
    }

    .bullet-drop-zone.drag-over {
      min-height: 24px !important;
      background: rgba(37,99,235,.08);
      border: 2px dashed var(--accent);
    }

  </style>
</head>
<body>

<header>
  <h1>MOM</h1>
  <span class="subtitle" id="ui-subtitle">Notulen van Vergadering</span>
  <div class="spacer"></div>

  <!-- File version badge (shown after load/save) -->
  <span class="file-version-badge" id="file-version-badge" style="display:none;">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span id="file-version-label"></span>
  </span>

  <span class="version-tag"><strong>Versie</strong> 3.1</span>

  <div class="lang-group">
    <button type="button" class="lang-btn active" data-lang="NL" onclick="setLang('NL')">NL</button>
    <button type="button" class="lang-btn" data-lang="FR" onclick="setLang('FR')">FR</button>
    <button type="button" class="lang-btn" data-lang="EN" onclick="setLang('EN')">EN</button>
  </div>

  <div class="header-divider"></div>

  <!-- Save XML -->
  <button type="button" class="btn btn-save" id="btn-save-xml" onclick="saveXML()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    <span id="btn-save-text">Bewaar</span>
  </button>

  <!-- Load XML -->
  <button type="button" class="btn btn-load" id="btn-load-xml" onclick="document.getElementById('xml-file-input').click()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span id="btn-load-text">Lees</span>
  </button>
  <input type="file" id="xml-file-input" accept=".xml" onchange="loadXML(event)" />

  <div class="header-divider"></div>

  <button type="button" class="btn btn-secondary" id="btn-reset" onclick="resetForm()">Reset</button>
  <button type="button" class="btn btn-primary" id="btn-download" onclick="downloadMD()" style="margin-left:4px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <span id="btn-download-text">Download .txt</span>
  </button>
</header>

<div class="layout">

  <!-- LEFT: Form -->
  <div class="panel panel-form" id="form-panel">

    <!-- Meta -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-meeting-info">Vergaderinfo</span>
      </div>
      <div class="field">
        <label id="lbl-subject">Onderwerp</label>
        <input type="text" id="subject" placeholder="bijv. Kick-off Vergadering" oninput="updatePreview()" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:12px;">
        <div class="field">
          <label id="lbl-project-id">Project ID</label>
          <input type="text" id="project-id" placeholder="bijv. PR-01" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label id="lbl-doc-type">Doc Type</label>
          <input type="text" id="doc-type" placeholder="e.g. MOM" value="MOM" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label id="lbl-date">Datum</label>
          <input type="date" id="meeting-date" oninput="updatePreview()" />
        </div>
      </div>
      <div class="section-header" style="margin-top:14px;margin-bottom:8px;">
        <span class="section-title" id="ui-participants-title" style="font-size:.8rem;">PARTICIPANTS</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-participant" onclick="addParticipant()">+ Deelnemer toevoegen</button>
      </div>
      <div id="participants-container"></div>
    </div>

    <!-- Notes / Agenda Items -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-notes-title">Notities</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-note" onclick="addNote()">+ Onderwerp toevoegen</button>
      </div>
      <div id="notes-container"></div>
    </div>

    <!-- Decisions -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-decisions-title">Beslissingen</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-decision" onclick="addDecision()">+ Toevoegen</button>
      </div>
      <div id="decisions-container"></div>
    </div>

    <!-- Action Points -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-actions-title">Actiepunten</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-action" onclick="addAction()">+ Toevoegen</button>
      </div>
      <div id="actions-container"></div>
    </div>

  </div>

  <!-- RIGHT: Preview -->
  <div class="panel panel-preview">
    <div class="preview-header" onclick="togglePreview()" style="cursor:pointer;user-select:none;">
      <div style="display:flex;align-items:center;gap:8px;">
        <svg id="preview-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cdd6f4" stroke-width="2.5" style="transition:transform .2s;transform:rotate(0deg);">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span class="preview-title" id="ui-preview-title">Markdown Preview</span>
      </div>
      <button type="button" class="btn btn-secondary btn-small" onclick="event.stopPropagation();copyToClipboard()" style="background:#313244;color:#cdd6f4;border:1px solid #45475a;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="btn-copy-text">Kopieer</span>
      </button>
    </div>
    <div id="preview-body" style="display:none;">
      <div class="ref-preview" id="ref-preview"></div>
      <pre id="preview-output"></pre>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>

  var currentLang = 'NL';

  function t(key) {
    return translations[currentLang][key] || translations['EN'][key] || key;
  }

  function setLang(lang) {
    currentLang = lang;
    var btns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].getAttribute('data-lang') === lang) {
        btns[i].className = 'lang-btn active';
      } else {
        btns[i].className = 'lang-btn';
      }
    }
    applyLang();
  }

  function applyLang() {
    document.getElementById('ui-subtitle').textContent = t('subtitle');
    document.getElementById('ui-meeting-info').textContent = t('meetingInfo');
    document.getElementById('lbl-project-id').textContent = t('projectId');
    document.getElementById('lbl-doc-type').textContent = t('docType');

  // ─── Markdown generation ──────────────────────────────────────────────────
  function buildReference() {
    var date = document.getElementById('meeting-date').value || '';
    var projectId = document.getElementById('project-id').value.trim();
    var docType = document.getElementById('doc-type').value.trim() || 'MOM';
    var subject = document.getElementById('subject').value.trim();

    var datePart = date ? date.replace(/-/g, '') : 'YYYYMMDD';
    var projPart = projectId || '[Project ID]';
    var docPart = docType;
    var subPart = subject ? subject.replace(/\s+/g, '-') : '[Subject]';

    return datePart + '_' + projPart + '_' + docPart + '_' + subPart;
  }

  function buildMarkdown(isTemplate) {
    if (isTemplate) {
      return 'YYYYMMDD_ProjectID_MOM_Subject\n\n' +
        '## [Subject]\n\n' +
        '## ' + t('mdDate') + '\n\n' +
        '- [Actual Date]\n\n' +
        '## ' + t('mdParticipants') + '\n\n' +
        '- [Name]\n\n' +
        '## ' + t('mdContent') + '\n\n' +
        '- [Topic Heading]\n\n' +
        '# ' + t('mdNotes') + '\n\n' +
        '## [Topic Heading]\n\n' +
        '- Bullet points with text\n\n' +
        '# ' + t('mdFollowUp') + '\n\n' +
        '## ' + t('mdDecisions') + '\n\n' +
        '- [Decision 1]\n\n' +
        '## ' + t('mdActionPoints') + '\n\n' +
        '- [Action description] - [AssigneeName]\n';
    }

    var date = document.getElementById('meeting-date').value;
    var subject = document.getElementById('subject').value.trim();

    var displayDate = date
      ? new Date(date + 'T00:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' })
      : '[Date]';

    var ref = buildReference();
    var md = '';

    md += ref + '\n\n';
    md += '## ' + (subject || '[Subject]') + '\n\n';
    md += '## ' + t('mdDate') + '\n\n';
    md += '- ' + displayDate + '\n\n';

    md += '## ' + t('mdParticipants') + '\n\n';
    var filledParticipants = participants.filter(function(p) { return p.name.trim(); });
    if (filledParticipants.length > 0) {
      for (var pi = 0; pi < filledParticipants.length; pi++) {
        var presenceMarker = filledParticipants[pi].present ? '\u2713' : '\u2717';
        md += '- [' + presenceMarker + '] ' + filledParticipants[pi].name.trim() + '\n';
      }
    } else {
      md += '- \n';
    }
    md += '\n';

    md += '## ' + t('mdContent') + '\n\n';
    if (notes.length > 0) {
      for (var ci = 0; ci < notes.length; ci++) {
        var heading = notes[ci].subject || (t('topicLabel') + ' ' + (ci + 1));
        md += '- ' + heading + '\n';
      }
    } else {
      md += '- [Table of Contents]\n';
    }

    md += '\n# ' + t('mdNotes') + '\n\n';
    if (notes.length > 0) {
      for (var ni = 0; ni < notes.length; ni++) {
        var noteHeading = notes[ni].subject || (t('topicLabel') + ' ' + (ni + 1));
        md += '## ' + noteHeading + '\n\n';
        var filledBullets = notes[ni].bullets.filter(function(b) { return b.trim(); });
        if (filledBullets.length > 0) {
          for (var bi = 0; bi < filledBullets.length; bi++) {
            md += '- ' + filledBullets[bi].trim() + '\n';
          }
        } else {
          md += '- \n';
        }
        md += '\n';
      }
    }

    md += '# ' + t('mdFollowUp') + '\n\n';
    md += '## ' + t('mdDecisions') + '\n\n';
    var filledDecisions = decisions.filter(function(d) { return d.trim(); });
    if (filledDecisions.length > 0) {
      for (var di = 0; di < filledDecisions.length; di++) {
        md += '- ' + filledDecisions[di].trim() + '\n';
      }
    } else {
      md += '- \n';
    }

    md += '\n## ' + t('mdActionPoints') + '\n\n';
    var filledActions = actions.filter(function(a) { return a.text.trim(); });
    if (filledActions.length > 0) {
      for (var ai = 0; ai < filledActions.length; ai++) {
        var assignee = filledActions[ai].assignee.trim() ? ' - ' + filledActions[ai].assignee.trim() : '';
        md += '- ' + filledActions[ai].text.trim() + assignee + '\n';
      }
    } else {
      md += '- \n';
    }

    return md;
  }

  function hasData() {
    var subject = document.getElementById('subject').value.trim();
    var projectId = document.getElementById('project-id').value.trim();
    var hasNoteContent = notes.some(function(n) { return n.subject.trim() || n.bullets.some(function(b) { return b.trim(); }); });
    var hasDecisions = decisions.some(function(d) { return d.trim(); });
    var hasActions = actions.some(function(a) { return a.text.trim(); });
    return subject || projectId || hasNoteContent || hasDecisions || hasActions;
  }

  // ─── XML Helpers ──────────────────────────────────────────────────────────
  function escXml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&apos;');
  }

  function getXmlText(parentEl, tagName) {
    var el = parentEl.querySelector(tagName);
    return el ? (el.textContent || '') : '';
  }

  // ─── XML Build ────────────────────────────────────────────────────────────
  function buildXML(version) {
    var projectId = document.getElementById('project-id').value.trim();
    var docType = document.getElementById('doc-type').value.trim();
    var subject = document.getElementById('subject').value.trim();
    var date = document.getElementById('meeting-date').value;

    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<mom version="' + version + '" lang="' + currentLang + '">\n';
    xml += '  <meta>\n';
    xml += '    <projectId>' + escXml(projectId) + '</projectId>\n';
    xml += '    <docType>' + escXml(docType) + '</docType>\n';
    xml += '    <subject>' + escXml(subject) + '</subject>\n';
    xml += '    <date>' + escXml(date) + '</date>\n';
    xml += '  </meta>\n';

    xml += '  <participants>\n';
    for (var pi = 0; pi < participants.length; pi++) {
      xml += '    <participant present="' + (participants[pi].present ? 'true' : 'false') + '">' + escXml(participants[pi].name) + '</participant>\n';
    }
    xml += '  </participants>\n';

    xml += '  <notes>\n';
    for (var ni = 0; ni < notes.length; ni++) {
      var note = notes[ni];
      xml += '    <note>\n';
      xml += '      <subject>' + escXml(note.subject) + '</subject>\n';
      xml += '      <bullets>\n';
      for (var bi = 0; bi < note.bullets.length; bi++) {
        xml += '        <bullet>' + escXml(note.bullets[bi]) + '</bullet>\n';
      }
      xml += '      </bullets>\n';
      xml += '    </note>\n';
    }
    xml += '  </notes>\n';

    xml += '  <decisions>\n';
    for (var di = 0; di < decisions.length; di++) {
      xml += '    <decision>' + escXml(decisions[di]) + '</decision>\n';
    }
    xml += '  </decisions>\n';

    xml += '  <actions>\n';
    for (var ai = 0; ai < actions.length; ai++) {
      xml += '    <action>\n';
      xml += '      <text>' + escXml(actions[ai].text) + '</text>\n';
      xml += '      <assignee>' + escXml(actions[ai].assignee) + '</assignee>\n';
      xml += '    </action>\n';
    }
    xml += '  </actions>\n';

    xml += '</mom>\n';
    return xml;
  }

  // ─── XML Save ─────────────────────────────────────────────────────────────
  function saveXML() {
    // Increment version on every save
    currentFileVersion++;
    loadedFromFile = true;

    var ref = buildReference();
    var filename = ref + '_v' + currentFileVersion + '.xml';
    var xml = buildXML(currentFileVersion);

    var blob = new Blob([xml], { type: 'application/xml;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    updateVersionBadge();
    showToast(t('toastSaved') + filename);
  }

  // ─── XML Load ─────────────────────────────────────────────────────────────
  function loadXML(event) {
    var file = event.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var parser = new DOMParser();
        var xmlDoc = parser.parseFromString(e.target.result, 'application/xml');

        // Check for parse errors
        var parseError = xmlDoc.querySelector('parsererror');
        if (parseError) {
          showToast(t('toastInvalidXml'));
          return;
        }

        var momEl = xmlDoc.querySelector('mom');
        if (!momEl) {
          showToast(t('toastInvalidXml'));
          return;
        }

        // Extract version from XML attribute
        var xmlVersion = parseInt(momEl.getAttribute('version') || '0', 10);
        var xmlLang = momEl.getAttribute('lang') || 'NL';

        // Also try to extract version from filename (e.g. _v3.xml)
        var filenameMatch = file.name.match(/_v(\d+)\.xml$/i);
        if (filenameMatch) {
          var fnVersion = parseInt(filenameMatch[1], 10);
          if (fnVersion > xmlVersion) xmlVersion = fnVersion;
        }

        currentFileVersion = xmlVersion;
        loadedFromFile = true;

        // Set language
        setLang(xmlLang);

        // Meta
        var metaEl = xmlDoc.querySelector('meta');
        if (metaEl) {
          document.getElementById('project-id').value = getXmlText(metaEl, 'projectId');
          document.getElementById('doc-type').value = getXmlText(metaEl, 'docType') || 'MOM';
          document.getElementById('subject').value = getXmlText(metaEl, 'subject');
          document.getElementById('meeting-date').value = getXmlText(metaEl, 'date');
        }

        // Participants
        participants = [];
        var partEls = xmlDoc.querySelectorAll('participants > participant');
        for (var pi = 0; pi < partEls.length; pi++) {
          var presAttr = partEls[pi].getAttribute('present');
          var isPresent = presAttr !== 'false';
          participants.push({ name: partEls[pi].textContent || '', present: isPresent });
        }
        if (participants.length === 0) participants.push({ name: '', present: true });

        // Notes
        notes = [];
        var noteEls = xmlDoc.querySelectorAll('notes > note');
        for (var ni = 0; ni < noteEls.length; ni++) {
          var noteEl = noteEls[ni];
          var noteSubject = getXmlText(noteEl, 'subject');
          var bulletEls = noteEl.querySelectorAll('bullets > bullet');
          var bullets = [];
          for (var bi = 0; bi < bulletEls.length; bi++) {
            bullets.push(bulletEls[bi].textContent || '');
          }
          if (bullets.length === 0) bullets.push('');
          notes.push({ id: Date.now() + ni, subject: noteSubject, bullets: bullets });
        }
        if (notes.length === 0) {
          notes.push({ id: Date.now(), subject: '', bullets: [''] });
        }

        // Decisions
        decisions = [];
        var decEls = xmlDoc.querySelectorAll('decisions > decision');
        for (var di = 0; di < decEls.length; di++) {
          decisions.push(decEls[di].textContent || '');
        }
        if (decisions.length === 0) decisions.push('');

        // Actions
        actions = [];
        var actEls = xmlDoc.querySelectorAll('actions > action');
        for (var ai = 0; ai < actEls.length; ai++) {
          var actEl = actEls[ai];
          actions.push({
            text: getXmlText(actEl, 'text'),
            assignee: getXmlText(actEl, 'assignee')
          });
        }
        if (actions.length === 0) actions.push({ text: '', assignee: '' });

        // Re-render everything
        renderParticipants();
        renderNotes();
        renderDecisions();
        renderActions();
        updatePreview();
        updateVersionBadge();

        showToast(t('toastLoaded') + file.name);

      } catch (err) {
        console.error('XML load error:', err);
        showToast(t('toastLoadError'));
      }
    };
    reader.readAsText(file);

    // Reset the file input so the same file can be loaded again
    event.target.value = '';
  }

  // ─── Download / Copy / Reset ───────────────────────────────────────────────
  function downloadMD() {
    var useTemplate = !hasData();
    var md = buildMarkdown(useTemplate);
    var ref = buildReference();
    var versionSuffix = currentFileVersion > 0 ? '_v' + currentFileVersion : '';
    var filename = (useTemplate ? 'YYYYMMDD_ProjectID_MOM_Subject' : ref) + versionSuffix + '.txt';

    var blob = new Blob([md], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    showToast(useTemplate ? t('toastTemplate') : t('toastDownloaded') + filename);
  }

  function copyToClipboard() {
    var text = document.getElementById('preview-output').textContent;
    navigator.clipboard.writeText(text).then(function() {
      showToast(t('toastCopied'));
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(t('toastCopied'));
    });
  }

  function resetForm() {
    if (!hasData() || confirm(t('confirmReset'))) {
      document.getElementById('project-id').value = '';
      document.getElementById('doc-type').value = 'MOM';
      document.getElementById('subject').value = '';
      document.getElementById('meeting-date').value = new Date().toISOString().split('T')[0];
      notes = [];
      decisions = [];
      actions = [];
      participants = [];
      currentFileVersion = 0;
      loadedFromFile = false;
      addParticipant(false);
      addNote();
      addDecision();
      addAction();
      updatePreview();
      updateVersionBadge();
    }
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(str) {
    return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ─── Drag & Drop Engine ───────────────────────────────────────────────────
  var dragSrcIndex = null;
  var dragType = null;
  var dragNoteId = null;

  var dragHandleSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>';

  function onDragStart(e, type, index, noteId) {
    e.stopPropagation();
    dragSrcIndex = index;
    dragType = type;
    dragNoteId = noteId || null;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', index);
    setTimeout(function() {
      var el = e.target.closest('.draggable-item, .drag-topic');
      if (el) el.classList.add('dragging');
    }, 0);
  }

  function onDragOver(e) {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
    var item = e.target.closest('.draggable-item, .drag-topic');
    if (item) {
      // Only highlight if same type
      var itemType = item.getAttribute('data-drag-type');
      if (itemType === dragType) {
        item.classList.add('drag-over');
      }
    }
  }

  function onDragLeave(e) {
    e.stopPropagation();
    var item = e.target.closest('.draggable-item, .drag-topic');
    if (item) item.classList.remove('drag-over');
  }

  function onDragEnd(e) {
    e.stopPropagation();
    var items = document.querySelectorAll('.dragging, .drag-over');
    for (var i = 0; i < items.length; i++) {
      items[i].classList.remove('dragging', 'drag-over');
    }
    dragSrcIndex = null;
    dragType = null;
    dragNoteId = null;
  }

  function onDrop(e, type, targetIndex, noteId) {
    e.preventDefault();
    e.stopPropagation();
    var item = e.target.closest('.draggable-item, .drag-topic');
    if (item) item.classList.remove('drag-over');

    if (dragType !== type) return;
    if (dragSrcIndex === null) return;

    if (type === 'bullet') {
      var srcNote = notes.find(function(n) { return n.id === dragNoteId; });
      var tgtNote = notes.find(function(n) { return n.id === noteId; });
      if (!srcNote || !tgtNote) return;
      // Same note, same index — nothing to do
      if (dragNoteId === noteId && dragSrcIndex === targetIndex) return;
      // Remove from source
      var moved = srcNote.bullets.splice(dragSrcIndex, 1)[0];
      // If source note has no bullets left, add an empty one
      if (srcNote.bullets.length === 0) srcNote.bullets.push('');
      // Insert into target
      tgtNote.bullets.splice(targetIndex, 0, moved);
      renderNotes();
      updatePreview();
    } else if (type === 'note') {
      if (dragSrcIndex === targetIndex) return;
      var moved = notes.splice(dragSrcIndex, 1)[0];
      notes.splice(targetIndex, 0, moved);
      renderNotes();
      updatePreview();
    } else if (type === 'decision') {
      if (dragSrcIndex === targetIndex) return;
      var moved = decisions.splice(dragSrcIndex, 1)[0];
      decisions.splice(targetIndex, 0, moved);
      renderDecisions();
      updatePreview();
    } else if (type === 'action') {
      if (dragSrcIndex === targetIndex) return;
      var moved = actions.splice(dragSrcIndex, 1)[0];
      actions.splice(targetIndex, 0, moved);
      renderActions();
      updatePreview();
    }

    dragSrcIndex = null;
    dragType = null;
    dragNoteId = null;
  }
</script>
</body>
</html>
