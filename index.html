<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOM - Minutes of Meeting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --border: #e0e3eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }

    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.3px; }
    header span.subtitle { color: var(--muted); font-size: .875rem; }
    header .spacer { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-danger:hover { background: #fecaca; }
    .btn-small { padding: 4px 10px; font-size: .75rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 57px);
    }

    .panel { overflow-y: auto; padding: 24px; }
    .panel-form { border-right: 1px solid var(--border); }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input[type="text"], input[type="date"], textarea, select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .9rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }
    .field { margin-bottom: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .note-item, .action-item, .decision-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }

    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .item-index {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .bullet-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: flex-start;
    }

    .bullet-row textarea { flex: 1; min-height: 40px; }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      width: 100%;
      cursor: pointer;
      color: var(--muted);
      font-size: .85rem;
      transition: all .15s;
    }

    .add-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,.04); }

    .panel-preview { background: #1e1e2e; }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .preview-title {
      color: #cdd6f4;
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    #preview-output {
      background: #181825;
      border-radius: var(--radius);
      padding: 20px;
      color: #cdd6f4;
      font-family: 'Courier New', Consolas, monospace;
      font-size: .82rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 200px;
      border: 1px solid #313244;
    }

    .ref-preview { font-size: .75rem; color: #a6adc8; margin-bottom: 10px; font-family: monospace; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: .875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .panel-form { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>MOM</h1>
  <span class="subtitle">Minutes of Meeting</span>
  <div class="spacer"></div>
  <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
  <button class="btn btn-primary" onclick="downloadMD()" style="margin-left:8px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download .md
  </button>
</header>

<div class="layout">

  <div class="panel panel-form" id="form-panel">
    <div class="section">
      <div class="section-header"><span class="section-title">Meeting Info</span></div>
      <div class="row">
        <div class="field">
          <label>Project ID</label>
          <input type="text" id="project-id" placeholder="e.g. PROJ-01" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label>Doc Type</label>
          <input type="text" id="doc-type" placeholder="e.g. MOM" value="MOM" oninput="updatePreview()" />
        </div>
      </div>
      <div class="field">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="e.g. Kick-off Meeting" oninput="updatePreview()" />
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="meeting-date" oninput="updatePreview()" />
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Notes</span>
        <button class="btn btn-secondary btn-small" onclick="addNote()">+ Add Topic</button>
      </div>
      <div id="notes-container"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Decisions</span>
        <button class="btn btn-secondary btn-small" onclick="addDecision()">+ Add</button>
      </div>
      <div id="decisions-container"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Action Points</span>
        <button class="btn btn-secondary btn-small" onclick="addAction()">+ Add</button>
      </div>
      <div id="actions-container"></div>
    </div>
  </div>

  <div class="panel panel-preview">
    <div class="preview-header">
      <span class="preview-title">Markdown Preview</span>
      <button class="btn btn-secondary btn-small" onclick="copyToClipboard()" style="background:#313244;color:#cdd6f4;border:1px solid #45475a;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
    </div>
    <div class="ref-preview" id="ref-preview"></div>
    <pre id="preview-output"></pre>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let notes = [];
  let decisions = [];
  let actions = [];

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('meeting-date').value = new Date().toISOString().split('T')[0];
    addNote();
    addDecision();
    addAction();
    updatePreview();
  });

  function addNote() {
    const id = Date.now();
    notes.push({ id, subject: '', bullets: [''] });
    renderNotes();
    updatePreview();
  }

  function removeNote(id) {
    notes = notes.filter(n => n.id !== id);
    renderNotes();
    updatePreview();
  }

  function addBullet(noteId) {
    const note = notes.find(n => n.id === noteId);
    if (note) note.bullets.push('');
    renderNotes();
    updatePreview();
  }

  function removeBullet(noteId, idx) {
    const note = notes.find(n => n.id === noteId);
    if (note && note.bullets.length > 1) {
      note.bullets.splice(idx, 1);
    } else if (note) {
      note.bullets[0] = '';
    }
    renderNotes();
    updatePreview();
  }

  function renderNotes() {
    const container = document.getElementById('notes-container');
    container.innerHTML = '';
    notes.forEach((note, ni) => {
      const div = document.createElement('div');
      div.className = 'note-item';
      div.innerHTML = `
        <div class="item-header">
          <span class="item-index">Topic ${ni + 1}</span>
          <button class="btn btn-danger btn-small" onclick="removeNote(${note.id})">Remove</button>
        </div>
        <div class="field">
          <label>Subject / Heading</label>
          <input type="text" value="${escAttr(note.subject)}" placeholder="e.g. Project Status"
            oninput="notes.find(n=>n.id===${note.id}).subject=this.value;updatePreview()" />
        </div>
        <label>Bullet Points</label>
        <div class="bullet-list" id="bullets-${note.id}">
          ${note.bullets.map((b, bi) => `
            <div class="bullet-row">
              <textarea rows="1" placeholder="Note…"
                oninput="notes.find(n=>n.id===${note.id}).bullets[${bi}]=this.value;autoResize(this);updatePreview()"
              >${escHtml(b)}</textarea>
              <button class="btn btn-danger btn-small" onclick="removeBullet(${note.id},${bi})" style="margin-top:2px">✕</button>
            </div>`).join('')}
        </div>
        <button class="add-btn" onclick="addBullet(${note.id})" style="margin-top:8px">+ bullet</button>
      `;
      container.appendChild(div);
    });
  }

  function addDecision() {
    decisions.push('');
    renderDecisions();
    updatePreview();
  }

  function removeDecision(idx) {
    decisions.splice(idx, 1);
    renderDecisions();
    updatePreview();
  }

  function renderDecisions() {
    const container = document.getElementById('decisions-container');
    container.innerHTML = '';
    decisions.forEach((d, i) => {
      const div = document.createElement('div');
      div.className = 'decision-item';
      div.innerHTML = `
        <div class="bullet-row">
          <textarea rows="1" placeholder="Decision…"
            oninput="decisions[${i}]=this.value;autoResize(this);updatePreview()"
          >${escHtml(d)}</textarea>
          <button class="btn btn-danger btn-small" onclick="removeDecision(${i})" style="margin-top:2px">✕</button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function addAction() {
    actions.push({ text: '', assignee: '' });
    renderActions();
    updatePreview();
  }

  function removeAction(idx) {
    actions.splice(idx, 1);
    renderActions();
    updatePreview();
  }

  function renderActions() {
    const container = document.getElementById('actions-container');
    container.innerHTML = '';
    actions.forEach((a, i) => {
      const div = document.createElement('div');
      div.className = 'action-item';
      div.innerHTML = `
        <div class="item-header">
          <span class="item-index">Action ${i + 1}</span>
          <button class="btn btn-danger btn-small" onclick="removeAction(${i})">Remove</button>
        </div>
        <div class="field">
          <label>Action</label>
          <textarea rows="2" placeholder="Describe the action…"
            oninput="actions[${i}].text=this.value;autoResize(this);updatePreview()"
          >${escHtml(a.text)}</textarea>
        </div>
        <div class="field">
          <label>Assignee</label>
          <input type="text" value="${escAttr(a.assignee)}" placeholder="Name"
            oninput="actions[${i}].assignee=this.value;updatePreview()" />
        </div>
      `;
      container.appendChild(div);
    });
  }

  function buildReference() {
    const date = document.getElementById('meeting-date').value || '';
    const projectId = document.getElementById('project-id').value.trim();
    const docType = document.getElementById('doc-type').value.trim() || 'MOM';
    const subject = document.getElementById('subject').value.trim();
    const datePart = date ? date.replace(/-/g, '') : 'YYYYMMDD';
    const projPart = projectId || '[Project ID]';
    const subPart = subject ? subject.replace(/\s+/g, '-') : '[Subject]';
    return `${datePart}_${projPart}_${docType}_${subPart}`;
  }

  function buildMarkdown(isTemplate = false) {
    if (isTemplate) {
      return `# [Subject]\n\n## Date\n\n- [Actual Date]\n\n## Content\n\n[Table of Contents]\n\n# Notes\n\n## [Topic Heading]\n\n- Bullet points with text\n\n# Follow-Up\n\n## Decisions\n\n- [Decision 1]\n\n## Action Points\n\n- [Action description] - [AssigneeName]\n`;
    }

    const date = document.getElementById('meeting-date').value;
    const subject = document.getElementById('subject').value.trim();
    const displayDate = date
      ? new Date(date + 'T00:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' })
      : '[Date]';

    let md = `# ${subject || '[Subject]'}\n\n## Date\n\n- ${displayDate}\n\n## Content\n\n`;

    if (notes.length > 0) {
      notes.forEach((note, i) => { md += `${i + 1}. [${note.subject || `Topic ${i+1}`}](#${slugify(note.subject || `topic-${i+1}`)})\n`; });
    } else {
      md += `[Table of Contents]\n`;
    }

    md += `\n# Notes\n\n`;
    notes.forEach((note) => {
      md += `## ${note.subject || 'Topic'}\n\n`;
      const filled = note.bullets.filter(b => b.trim());
      (filled.length ? filled : ['']).forEach(b => { md += `- ${b.trim()}\n`; });
      md += '\n';
    });

    md += `\n# Follow-Up\n\n## Decisions\n\n`;
    const filledD = decisions.filter(d => d.trim());
    (filledD.length ? filledD : ['']).forEach(d => { md += `- ${d.trim()}\n`; });

    md += `\n## Action Points\n\n`;
    const filledA = actions.filter(a => a.text.trim());
    (filledA.length ? filledA : ['']).forEach(a => {
      const assignee = a.assignee && a.assignee.trim() ? ` - ${a.assignee.trim()}` : '';
      md += `- ${a.text.trim()}${assignee}\n`;
    });

    return md;
  }

  function slugify(text) {
    return text.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
  }

  function hasData() {
    return document.getElementById('subject').value.trim() ||
           document.getElementById('project-id').value.trim() ||
           notes.some(n => n.subject.trim() || n.bullets.some(b => b.trim())) ||
           decisions.some(d => d.trim()) ||
           actions.some(a => a.text.trim());
  }

  function updatePreview() {
    document.getElementById('ref-preview').textContent = 'Reference: ' + buildReference();
    document.getElementById('preview-output').textContent = buildMarkdown(false);
  }

  function downloadMD() {
    const useTemplate = !hasData();
    const md = buildMarkdown(useTemplate);
    const filename = (useTemplate ? 'YYYYMMDD_ProjectID_MOM_Subject' : buildReference()) + '.md';
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    showToast(useTemplate ? 'Template downloaded!' : 'Downloaded: ' + filename);
  }

  function copyToClipboard() {
    const text = document.getElementById('preview-output').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!')).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied to clipboard!');
    });
  }

  function resetForm() {
    if (!hasData() || confirm('Reset all fields?')) {
      document.getElementById('project-id').value = '';
      document.getElementById('doc-type').value = 'MOM';
      document.getElementById('subject').value = '';
      document.getElementById('meeting-date').value = new Date().toISOString().split('T')[0];
      notes = []; decisions = []; actions = [];
      addNote(); addDecision(); addAction();
      updatePreview();
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
  function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(str) { return str.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
</html>
