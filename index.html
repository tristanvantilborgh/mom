<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOM - Minutes of Meeting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --border: #e0e3eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.3px;
      color: var(--accent);
    }

    header span.subtitle {
      color: var(--muted);
      font-size: .875rem;
    }

    header .spacer { flex: 1; }

    .lang-group {
      display: inline-flex;
      gap: 4px;
      margin-right: 8px;
    }

    .lang-btn {
      display: inline-block;
      padding: 5px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background-color: transparent;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      line-height: 1;
    }

    .lang-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lang-btn.active {
      background-color: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-danger:hover { background: #fecaca; }
    .btn-small { padding: 4px 10px; font-size: .75rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 57px);
    }

    .panel {
      overflow-y: auto;
      padding: 24px;
    }

    .panel-form { border-right: 1px solid var(--border); }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .9rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .field { margin-bottom: 14px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .note-item, .action-item, .decision-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }

    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .item-index {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .bullet-list { }

    .bullet-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: flex-start;
    }

    .bullet-row textarea {
      flex: 1;
      min-height: 40px;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      width: 100%;
      cursor: pointer;
      color: var(--muted);
      font-size: .85rem;
      transition: all .15s;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(37,99,235,.04);
    }

    /* Preview panel */
    .panel-preview { background: #1e1e2e; }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .preview-title {
      color: #cdd6f4;
      font-weight: 700;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    #preview-output {
      background: #181825;
      border-radius: var(--radius);
      padding: 20px;
      color: #cdd6f4;
      font-family: 'Courier New', Consolas, monospace;
      font-size: .82rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 200px;
      border: 1px solid #313244;
    }

    .ref-preview {
      font-size: .75rem;
      color: #a6adc8;
      margin-bottom: 10px;
      font-family: monospace;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: .875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .panel-form { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>MOM</h1>
  <span class="subtitle" id="ui-subtitle">Notulen van Vergadering</span>
  <div class="spacer"></div>
  <div class="lang-group">
    <button type="button" class="lang-btn active" data-lang="NL" onclick="setLang('NL')">NL</button>
    <button type="button" class="lang-btn" data-lang="FR" onclick="setLang('FR')">FR</button>
    <button type="button" class="lang-btn" data-lang="EN" onclick="setLang('EN')">EN</button>
  </div>
  <button type="button" class="btn btn-secondary" id="btn-reset" onclick="resetForm()">Reset</button>
  <button type="button" class="btn btn-primary" id="btn-download" onclick="downloadMD()" style="margin-left:8px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <span id="btn-download-text">Download .txt</span>
  </button>
</header>

<div class="layout">

  <!-- LEFT: Form -->
  <div class="panel panel-form" id="form-panel">

    <!-- Meta -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-meeting-info">Vergaderinfo</span>
      </div>
      <div class="row">
        <div class="field">
          <label id="lbl-project-id">Project ID</label>
          <input type="text" id="project-id" placeholder="bijv. PR-01" oninput="updatePreview()" />
        </div>
        <div class="field">
          <label id="lbl-doc-type">Doc Type</label>
          <input type="text" id="doc-type" placeholder="e.g. MOM" value="MOM" oninput="updatePreview()" />
        </div>
      </div>
      <div class="field">
        <label id="lbl-subject">Onderwerp</label>
        <input type="text" id="subject" placeholder="bijv. Kick-off Vergadering" oninput="updatePreview()" />
      </div>
      <div class="field">
        <label id="lbl-date">Datum</label>
        <input type="date" id="meeting-date" oninput="updatePreview()" />
      </div>
      <div class="section-header" style="margin-top:14px;margin-bottom:8px;">
        <span class="section-title" id="ui-participants-title" style="font-size:.8rem;">PARTICIPANTS</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-participant" onclick="addParticipant()">+ Deelnemer toevoegen</button>
      </div>
      <div id="participants-container"></div>
    </div>

    <!-- Notes / Agenda Items -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-notes-title">Notities</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-note" onclick="addNote()">+ Onderwerp toevoegen</button>
      </div>
      <div id="notes-container"></div>
    </div>

    <!-- Decisions -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-decisions-title">Beslissingen</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-decision" onclick="addDecision()">+ Toevoegen</button>
      </div>
      <div id="decisions-container"></div>
    </div>

    <!-- Action Points -->
    <div class="section">
      <div class="section-header">
        <span class="section-title" id="ui-actions-title">Actiepunten</span>
        <button type="button" class="btn btn-secondary btn-small" id="btn-add-action" onclick="addAction()">+ Toevoegen</button>
      </div>
      <div id="actions-container"></div>
    </div>

  </div>

  <!-- RIGHT: Preview -->
  <div class="panel panel-preview">
    <div class="preview-header">
      <span class="preview-title" id="ui-preview-title">Markdown Preview</span>
      <button type="button" class="btn btn-secondary btn-small" onclick="copyToClipboard()" style="background:#313244;color:#cdd6f4;border:1px solid #45475a;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="btn-copy-text">Kopieer</span>
      </button>
    </div>
    <div class="ref-preview" id="ref-preview"></div>
    <pre id="preview-output"></pre>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  var translations = {
    NL: {
      subtitle: 'Notulen van Vergadering',
      meetingInfo: 'Vergaderinfo',
      projectId: 'Project ID',
      docType: 'Doc Type',
      subject: 'Onderwerp',

      participants: 'PARTICIPANTS',
      addParticipant: '+ Deelnemer toevoegen',
      notes: 'Notities',
      addTopic: '+ Onderwerp toevoegen',

      add: '+ Toevoegen',
      actionPoints: 'Actiepunten',
      reset: 'Reset',
      download: 'Download .txt',
      previewTitle: 'Markdown Preview',
      copy: 'Kopieer',
      subjectHeading: 'Onderwerp / Titel',
      bulletPoints: 'Bullet Points',
      action: 'Actie',
      assignee: 'Verantwoordelijke',
      topicLabel: 'Onderwerp',
      actionLabel: 'Actie',
      remove: 'Verwijder',
      addBullet: '+ bullet',
      phProjectId: 'bijv. PR-01',
      phSubject: 'bijv. Kick-off Vergadering',
      phParticipant: 'Naam\u2026',
      phNote: 'Notitie\u2026',
      phDecision: 'Beslissing\u2026',
      phAction: 'Beschrijf de actie\u2026',
      phAssignee: 'Naam',
      confirmReset: 'Alle velden resetten?',
      toastTemplate: 'Sjabloon gedownload!',
      toastDownloaded: 'Gedownload: ',
      toastCopied: 'Gekopieerd naar klembord!',
      refLabel: 'Referentie: ',
      mdDate: 'DATUM',

      mdContent: 'INHOUD',
      mdNotes: 'NOTITIES',
      mdFollowUp: 'OPVOLGING',

      mdActionPoints: 'Actiepunten'
    },
    FR: {
      subtitle: 'Compte Rendu de R\u00e9union',
      meetingInfo: 'Info R\u00e9union',
      projectId: 'ID Projet',
      docType: 'Type Doc',
      subject: 'Sujet',
      date: 'Date',
      participants: 'PARTICIPANTS',
      addParticipant: '+ Ajouter Participant',
      notes: 'Notes',
      addTopic: '+ Ajouter Sujet',
      decisions: 'D\u00e9cisions',
      add: '+ Ajouter',
      actionPoints: "Points d'Action",
      reset: 'R\u00e9initialiser',
      download: 'T\u00e9l\u00e9charger .txt',
      previewTitle: 'Aper\u00e7u Markdown',
      copy: 'Copier',
      subjectHeading: 'Sujet / Titre',
      bulletPoints: 'Points',
      action: 'Action',
      assignee: 'Responsable',
      topicLabel: 'Sujet',
      actionLabel: 'Action',
      remove: 'Supprimer',
      addBullet: '+ point',
      phProjectId: 'ex. PR-01',
      phSubject: 'ex. R\u00e9union de Lancement',
      phParticipant: 'Nom\u2026',
      phNote: 'Note\u2026',
      phDecision: 'D\u00e9cision\u2026',
      phAction: "D\u00e9crire l'action\u2026",
      phAssignee: 'Nom',
      confirmReset: 'R\u00e9initialiser tous les champs?',
      toastTemplate: 'Mod\u00e8le t\u00e9l\u00e9charg\u00e9!',
      toastDownloaded: 'T\u00e9l\u00e9charg\u00e9: ',
      toastCopied: 'Copi\u00e9 dans le presse-papiers!',
      refLabel: 'R\u00e9f\u00e9rence: ',
      mdDate: 'DATE',
      mdParticipants: 'PARTICIPANTS',
      mdContent: 'CONTENU',
      mdNotes: 'NOTES',
      mdFollowUp: 'SUIVI',
      mdDecisions: 'D\u00e9cisions',
      mdActionPoints: "Points d'Action"
    },
    EN: {
      subtitle: 'Minutes of Meeting',
      meetingInfo: 'Meeting Info',
      projectId: 'Project ID',
      docType: 'Doc Type',
      subject: 'Subject',
      date: 'Date',
      participants: 'PARTICIPANTS',
      addParticipant: '+ Add Participant',
      notes: 'Notes',
      addTopic: '+ Add Topic',
      decisions: 'Decisions',
      add: '+ Add',
      actionPoints: 'Action Points',
      reset: 'Reset',
      download: 'Download .txt',
      previewTitle: 'Markdown Preview',
      copy: 'Copy',
      subjectHeading: 'Subject / Heading',
      bulletPoints: 'Bullet Points',
      action: 'Action',
      assignee: 'Assignee',
      topicLabel: 'Topic',
      actionLabel: 'Action',
      remove: 'Remove',
      addBullet: '+ bullet',
      phProjectId: 'e.g. PR-01',
      phSubject: 'e.g. Kick-off Meeting',
      phParticipant: 'Name\u2026',
      phNote: 'Note\u2026',
      phDecision: 'Decision\u2026',
      phAction: 'Describe the action\u2026',
      phAssignee: 'Name',
      confirmReset: 'Reset all fields?',
      toastTemplate: 'Template downloaded!',
      toastDownloaded: 'Downloaded: ',
      toastCopied: 'Copied to clipboard!',
      refLabel: 'Reference: ',
      mdDate: 'DATE',
      mdParticipants: 'PARTICIPANTS',
      mdContent: 'CONTENT',
      mdNotes: 'NOTES',
      mdFollowUp: 'FOLLOW-UP',
      mdDecisions: 'Decisions',
      mdActionPoints: 'Action Points'
    }
  };

  var currentLang = 'NL';

  function t(key) {
    return translations[currentLang][key] || translations['EN'][key] || key;
  }

  function setLang(lang) {
    currentLang = lang;
    var btns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].getAttribute('data-lang') === lang) {
        btns[i].className = 'lang-btn active';
      } else {
        btns[i].className = 'lang-btn';
      }
    }
    applyLang();
  }

  function applyLang() {
    document.getElementById('ui-subtitle').textContent = t('subtitle');
    document.getElementById('ui-meeting-info').textContent = t('meetingInfo');
    document.getElementById('lbl-project-id').textContent = t('projectId');
    document.getElementById('lbl-doc-type').textContent = t('docType');
    document.getElementById('lbl-subject').textContent = t('subject');
    document.getElementById('lbl-date').textContent = t('date');
    document.getElementById('ui-participants-title').textContent = t('participants');
    document.getElementById('btn-add-participant').textContent = t('addParticipant');
    document.getElementById('project-id').placeholder = t('phProjectId');
    document.getElementById('subject').placeholder = t('phSubject');
    document.getElementById('ui-notes-title').textContent = t('notes');
    document.getElementById('btn-add-note').textContent = t('addTopic');
    document.getElementById('ui-decisions-title').textContent = t('decisions');
    document.getElementById('btn-add-decision').textContent = t('add');
    document.getElementById('ui-actions-title').textContent = t('actionPoints');
    document.getElementById('btn-add-action').textContent = t('add');
    document.getElementById('btn-reset').textContent = t('reset');
    document.getElementById('btn-download-text').textContent = t('download');
    document.getElementById('ui-preview-title').textContent = t('previewTitle');
    document.getElementById('btn-copy-text').textContent = t('copy');
    renderParticipants();
    renderNotes();
    renderDecisions();
    renderActions();
    updatePreview();
  }

  var notes = [];
  var decisions = [];
  var actions = [];
  var participants = [];

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('meeting-date').value = new Date().toISOString().split('T')[0];
    addParticipant(false);
    addNote();
    addDecision();
    addAction();
    applyLang();
  });

  function addParticipant(focusLast) {
    participants.push('');
    renderParticipants();
    updatePreview();
    if (focusLast) {
      setTimeout(function() {
        var container = document.getElementById('participants-container');
        var inputs = container.querySelectorAll('input[type="text"]');
        if (inputs.length > 0) inputs[inputs.length - 1].focus();
      }, 10);
    }
  }

  function removeParticipant(idx) {
    participants.splice(idx, 1);
    renderParticipants();
    updatePreview();
  }

  function handleParticipantTab(event, idx) {
    if (event.key === 'Tab') {
      event.preventDefault();
      participants[idx] = event.target.value;
      addParticipant(true);
    }
  }

  function renderParticipants() {
    var container = document.getElementById('participants-container');
    container.innerHTML = '';
    for (var i = 0; i < participants.length; i++) {
      var div = document.createElement('div');
      div.className = 'decision-item';
      div.innerHTML =
        '<div class="bullet-row">' +
          '<input type="text" value="' + escAttr(participants[i]) + '" placeholder="' + escAttr(t('phParticipant')) + '"' +
            ' oninput="participants[' + i + ']=this.value;updatePreview()"' +
            ' onkeydown="handleParticipantTab(event,' + i + ')" />' +
          '<button type="button" class="btn btn-danger btn-small" onclick="removeParticipant(' + i + ')" style="margin-top:2px">\u2715</button>' +
        '</div>';
      container.appendChild(div);
    }
  }

  function addNote() {
    var id = Date.now();
    notes.push({ id: id, subject: '', bullets: [''] });
    renderNotes();
    updatePreview();
  }

  function removeNote(id) {
    notes = notes.filter(function(n) { return n.id !== id; });
    renderNotes();
    updatePreview();
  }

  function addBullet(noteId) {
    var note = notes.find(function(n) { return n.id === noteId; });
    if (note) note.bullets.push('');
    renderNotes();
    updatePreview();
  }

  function removeBullet(noteId, idx) {
    var note = notes.find(function(n) { return n.id === noteId; });
    if (note && note.bullets.length > 1) {
      note.bullets.splice(idx, 1);
    } else if (note) {
      note.bullets[0] = '';
    }
    renderNotes();
    updatePreview();
  }

  function renderNotes() {
    var container = document.getElementById('notes-container');
    container.innerHTML = '';
    for (var ni = 0; ni < notes.length; ni++) {
      var note = notes[ni];
      var div = document.createElement('div');
      div.className = 'note-item';
      var bulletsHtml = '';
      for (var bi = 0; bi < note.bullets.length; bi++) {
        bulletsHtml +=
          '<div class="bullet-row">' +
            '<textarea rows="1" placeholder="' + escAttr(t('phNote')) + '"' +
              ' oninput="notes.find(function(n){return n.id===' + note.id + '}).bullets[' + bi + ']=this.value;autoResize(this);updatePreview()"' +
            '>' + escHtml(note.bullets[bi]) + '</textarea>' +
            '<button type="button" class="btn btn-danger btn-small" onclick="removeBullet(' + note.id + ',' + bi + ')" style="margin-top:2px">\u2715</button>' +
          '</div>';
      }
      div.innerHTML =
        '<div class="item-header">' +
          '<span class="item-index">' + escHtml(t('topicLabel')) + ' ' + (ni + 1) + '</span>' +
          '<button type="button" class="btn btn-danger btn-small" onclick="removeNote(' + note.id + ')">' + escHtml(t('remove')) + '</button>' +
        '</div>' +
        '<div class="field">' +
          '<label>' + escHtml(t('subjectHeading')) + '</label>' +
          '<input type="text" value="' + escAttr(note.subject) + '" placeholder="e.g. Project Status"' +
            ' oninput="notes.find(function(n){return n.id===' + note.id + '}).subject=this.value;updatePreview()" />' +
        '</div>' +
        '<label>' + escHtml(t('bulletPoints')) + '</label>' +
        '<div class="bullet-list" id="bullets-' + note.id + '">' +
          bulletsHtml +
        '</div>' +
        '<button type="button" class="add-btn" onclick="addBullet(' + note.id + ')" style="margin-top:8px">' + escHtml(t('addBullet')) + '</button>';
      container.appendChild(div);
    }
  }

  function addDecision() {
    decisions.push('');
    renderDecisions();
    updatePreview();
  }

  function removeDecision(idx) {
    decisions.splice(idx, 1);
    renderDecisions();
    updatePreview();
  }

  function renderDecisions() {
    var container = document.getElementById('decisions-container');
    container.innerHTML = '';
    for (var i = 0; i < decisions.length; i++) {
      var div = document.createElement('div');
      div.className = 'decision-item';
      div.innerHTML =
        '<div class="bullet-row">' +
          '<textarea rows="1" placeholder="' + escAttr(t('phDecision')) + '"' +
            ' oninput="decisions[' + i + ']=this.value;autoResize(this);updatePreview()"' +
          '>' + escHtml(decisions[i]) + '</textarea>' +
          '<button type="button" class="btn btn-danger btn-small" onclick="removeDecision(' + i + ')" style="margin-top:2px">\u2715</button>' +
        '</div>';
      container.appendChild(div);
    }
  }

  function addAction() {
    actions.push({ text: '', assignee: '' });
    renderActions();
    updatePreview();
  }

  function removeAction(idx) {
    actions.splice(idx, 1);
    renderActions();
    updatePreview();
  }

  function renderActions() {
    var container = document.getElementById('actions-container');
    container.innerHTML = '';
    for (var i = 0; i < actions.length; i++) {
      var a = actions[i];
      var div = document.createElement('div');
      div.className = 'action-item';
      div.innerHTML =
        '<div class="item-header">' +
          '<span class="item-index">' + escHtml(t('actionLabel')) + ' ' + (i + 1) + '</span>' +
          '<button type="button" class="btn btn-danger btn-small" onclick="removeAction(' + i + ')">' + escHtml(t('remove')) + '</button>' +
        '</div>' +
        '<div class="field">' +
          '<label>' + escHtml(t('action')) + '</label>' +
          '<textarea rows="2" placeholder="' + escAttr(t('phAction')) + '"' +
            ' oninput="actions[' + i + '].text=this.value;autoResize(this);updatePreview()"' +
          '>' + escHtml(a.text) + '</textarea>' +
        '</div>' +
        '<div class="field">' +
          '<label>' + escHtml(t('assignee')) + '</label>' +
          '<input type="text" value="' + escAttr(a.assignee) + '" placeholder="' + escAttr(t('phAssignee')) + '"' +
            ' oninput="actions[' + i + '].assignee=this.value;updatePreview()" />' +
        '</div>';
      container.appendChild(div);
    }
  }

  function buildReference() {
    var date = document.getElementById('meeting-date').value || '';
    var projectId = document.getElementById('project-id').value.trim();
    var docType = document.getElementById('doc-type').value.trim() || 'MOM';
    var subject = document.getElementById('subject').value.trim();

    var datePart = date ? date.replace(/-/g, '') : 'YYYYMMDD';
    var projPart = projectId || '[Project ID]';
    var docPart = docType;
    var subPart = subject ? subject.replace(/\s+/g, '-') : '[Subject]';

    return datePart + '_' + projPart + '_' + docPart + '_' + subPart;
  }

  function buildMarkdown(isTemplate) {
    if (isTemplate) {
      return '# [Subject]\n\n' +
        '## ' + t('mdDate') + '\n\n' +
        '[Actual Date]\n\n' +
        '## ' + t('mdParticipants') + '\n\n' +
        '- [Name]\n\n' +
        '## ' + t('mdContent') + '\n\n' +
        '- [Topic Heading]\n\n' +
        '## ' + t('mdNotes') + '\n\n' +
        '### [Topic Heading]\n\n' +
        '- Bullet points with text\n\n' +
        '## ' + t('mdFollowUp') + '\n\n' +
        '### ' + t('mdDecisions') + '\n\n' +
        '- [Decision 1]\n\n' +
        '### ' + t('mdActionPoints') + '\n\n' +
        '- [Action description] - [AssigneeName]\n';
    }

    var date = document.getElementById('meeting-date').value;
    var subject = document.getElementById('subject').value.trim();

    var displayDate = date
      ? new Date(date + 'T00:00:00').toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' })
      : '[Date]';

    var md = '';

    md += '# ' + (subject || '[Subject]') + '\n\n';
    md += '## ' + t('mdDate') + '\n\n';
    md += displayDate + '\n\n';

    md += '## ' + t('mdParticipants') + '\n\n';
    var filledParticipants = participants.filter(function(p) { return p.trim(); });
    if (filledParticipants.length > 0) {
      for (var pi = 0; pi < filledParticipants.length; pi++) {
        md += '- ' + filledParticipants[pi].trim() + '\n';
      }
    } else {
      md += '- \n';
    }
    md += '\n';

    md += '## ' + t('mdContent') + '\n\n';

    if (notes.length > 0) {
      for (var ci = 0; ci < notes.length; ci++) {
        var heading = notes[ci].subject || (t('topicLabel') + ' ' + (ci + 1));
        md += '- ' + heading + '\n';
      }
    } else {
      md += '- [Table of Contents]\n';
    }

    md += '\n## ' + t('mdNotes') + '\n\n';

    if (notes.length > 0) {
      for (var ni = 0; ni < notes.length; ni++) {
        var noteHeading = notes[ni].subject || (t('topicLabel') + ' ' + (ni + 1));
        md += '### ' + noteHeading + '\n\n';
        var filledBullets = notes[ni].bullets.filter(function(b) { return b.trim(); });
        if (filledBullets.length > 0) {
          for (var bi = 0; bi < filledBullets.length; bi++) {
            md += '- ' + filledBullets[bi].trim() + '\n';
          }
        } else {
          md += '- \n';
        }
        md += '\n';
      }
    }

    md += '## ' + t('mdFollowUp') + '\n\n';

    md += '### ' + t('mdDecisions') + '\n\n';
    var filledDecisions = decisions.filter(function(d) { return d.trim(); });
    if (filledDecisions.length > 0) {
      for (var di = 0; di < filledDecisions.length; di++) {
        md += '- ' + filledDecisions[di].trim() + '\n';
      }
    } else {
      md += '- \n';
    }

    md += '\n### ' + t('mdActionPoints') + '\n\n';
    var filledActions = actions.filter(function(a) { return a.text.trim(); });
    if (filledActions.length > 0) {
      for (var ai = 0; ai < filledActions.length; ai++) {
        var assignee = filledActions[ai].assignee.trim() ? ' - ' + filledActions[ai].assignee.trim() : '';
        md += '- ' + filledActions[ai].text.trim() + assignee + '\n';
      }
    } else {
      md += '- \n';
    }

    return md;
  }

  function hasData() {
    var subject = document.getElementById('subject').value.trim();
    var projectId = document.getElementById('project-id').value.trim();
    var hasNoteContent = notes.some(function(n) { return n.subject.trim() || n.bullets.some(function(b) { return b.trim(); }); });
    var hasDecisions = decisions.some(function(d) { return d.trim(); });
    var hasActions = actions.some(function(a) { return a.text.trim(); });
    return subject || projectId || hasNoteContent || hasDecisions || hasActions;
  }

  function updatePreview() {
    var ref = buildReference();
    document.getElementById('ref-preview').textContent = t('refLabel') + ref;
    var md = buildMarkdown(false);
    document.getElementById('preview-output').textContent = md;
  }

  function downloadMD() {
    var useTemplate = !hasData();
    var md = buildMarkdown(useTemplate);
    var ref = buildReference();
    var filename = (useTemplate ? 'YYYYMMDD_ProjectID_MOM_Subject' : ref) + '.txt';

    var blob = new Blob([md], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    showToast(useTemplate ? t('toastTemplate') : t('toastDownloaded') + filename);
  }

  function copyToClipboard() {
    var text = document.getElementById('preview-output').textContent;
    navigator.clipboard.writeText(text).then(function() {
      showToast(t('toastCopied'));
    }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(t('toastCopied'));
    });
  }

  function resetForm() {
    if (!hasData() || confirm(t('confirmReset'))) {
      document.getElementById('project-id').value = '';
      document.getElementById('doc-type').value = 'MOM';
      document.getElementById('subject').value = '';
      document.getElementById('meeting-date').value = new Date().toISOString().split('T')[0];
      notes = [];
      decisions = [];
      actions = [];
      participants = [];
      addParticipant(false);
      addNote();
      addDecision();
      addAction();
      updatePreview();
    }
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(str) {
    return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
